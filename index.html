<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> ErvaNet – Cultivo de Buds</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/dexie@3/dist/dexie.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'JetBrains Mono', monospace
    }

    :root {
      --brass: #CD7F32;
      --copper: #B87333;
      --silver: #C0C0C0;
      --gold: #FFD700;
      --diamond: #00FFFF;
      --uranium: #39FF14;
      --opal: #FF69B4;
      --bismuth: #E8B4F8;
      --niobium: #C084FC
    }

    .card-brass {
      background: linear-gradient(135deg, #1a1208, #251a0e);
      border: 1px solid #CD7F32
    }

    .card-copper {
      background: linear-gradient(135deg, #1a1008, #25180d);
      border: 1px solid #B87333
    }

    .card-silver {
      background: linear-gradient(135deg, #111318, #1c2028);
      border: 1px solid #C0C0C0
    }

    .card-gold {
      background: linear-gradient(135deg, #1a1500, #2a2200);
      border: 1px solid #FFD700
    }

    .card-diamond {
      background: linear-gradient(135deg, #001a1a, #002828);
      border: 1px solid #00FFFF;
      animation: diamondGlow 2.5s ease-in-out infinite
    }

    .card-uranium {
      background: linear-gradient(135deg, #001a00, #002800);
      border: 1px solid #39FF14;
      animation: uraniumGlow 2s ease-in-out infinite
    }

    .card-opal {
      background: linear-gradient(135deg, #1a0010, #28001a);
      border: 1px solid #FF69B4;
      animation: opalGlow 3s ease-in-out infinite
    }

    .card-bismuth {
      background: linear-gradient(135deg, #150a1a, #1f0f28);
      border: 1px solid #E8B4F8;
      animation: bismuthGlow 2.5s ease-in-out infinite
    }

    .card-niobium {
      background: linear-gradient(135deg, #0d001a, #150028);
      border: 1px solid #C084FC;
      animation: niobiumGlow 1.5s ease-in-out infinite
    }

    @keyframes diamondGlow {

      0%,
      100% {
        box-shadow: 0 0 6px #00FFFF50, 0 0 12px #00FFFF20
      }

      50% {
        box-shadow: 0 0 20px #00FFFFa0, 0 0 40px #00FFFF50, 0 0 70px #00FFFF20
      }
    }

    @keyframes uraniumGlow {

      0%,
      100% {
        box-shadow: 0 0 6px #39FF1450, 0 0 12px #39FF1420
      }

      50% {
        box-shadow: 0 0 25px #39FF14b0, 0 0 50px #39FF1460
      }
    }

    @keyframes opalGlow {
      0% {
        box-shadow: 0 0 10px #FF69B480
      }

      33% {
        box-shadow: 0 0 20px #00FFFF80
      }

      66% {
        box-shadow: 0 0 20px #C084FC80
      }

      100% {
        box-shadow: 0 0 10px #FF69B480
      }
    }

    @keyframes bismuthGlow {

      0%,
      100% {
        box-shadow: 0 0 8px #E8B4F860
      }

      50% {
        box-shadow: 0 0 25px #E8B4F8b0, 0 0 50px #C084FC40
      }
    }

    @keyframes niobiumGlow {

      0%,
      100% {
        box-shadow: 0 0 12px #C084FCa0, 0 0 25px #C084FC50
      }

      50% {
        box-shadow: 0 0 35px #C084FCff, 0 0 70px #C084FC80, 0 0 100px #C084FC30
      }
    }

    @keyframes miningPulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.08)
      }
    }

    .cultivo-active {
      animation: miningPulse 0.6s ease-in-out infinite
    }

    @keyframes particleOut {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1
      }

      100% {
        transform: translate(var(--dx), var(--dy)) scale(0);
        opacity: 0
      }
    }

    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleOut 1s ease-out forwards
    }

    .shine-effect {
      position: relative;
      overflow: hidden
    }

    .shine-effect::after {
      content: '';
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      background: linear-gradient(45deg, transparent 35%, rgba(255, 255, 255, 0.08) 50%, transparent 65%);
      animation: shine 4s ease-in-out infinite
    }

    @keyframes shine {

      0%,
      100% {
        transform: translate(-100%, -100%)
      }

      60%,
      100% {
        transform: translate(100%, 100%)
      }
    }

    .badge-first {
      background: linear-gradient(135deg, #FFD700, #FF6B35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .scrollbar-thin::-webkit-scrollbar {
      width: 4px
    }

    .scrollbar-thin::-webkit-scrollbar-track {
      background: #111
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px
    }

    .progress-bar {
      transition: width 0.3s ease
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px) }
      to { opacity: 1; transform: translateY(0) }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .fade-in {
      animation: fadeIn 0.3s ease forwards
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px) rotate(-2deg); }
      40%, 80% { transform: translateX(4px) rotate(2deg); }
    }
    .shake-anim { animation: shake 0.4s ease-in-out; }

    select,
    input,
    textarea {
      color-scheme: dark
    }

    .glow-purple {
      color: #a855f7 !important;
      text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7;
      animation: purplePulse 2s infinite ease-in-out;
    }

    @keyframes purplePulse {
      0%, 100% { text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7; }
      50% { text-shadow: 0 0 15px #d8b4fe, 0 0 30px #a855f7, 0 0 40px #a855f7; }
    }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div id="app" class="max-w-6xl mx-auto"></div>
  <div id="toasts" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>
  <div id="particles" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>

  <script>
    // ═══════════════════════════════════════════════════════
    // CONFIG — edite DISCORD_CLIENT_ID para seu app Discord
    // ═══════════════════════════════════════════════════════
    const _u = (s) => s.split('').reverse().join('');
    const CFG = {
      DISCORD_CLIENT_ID: '1496324371445186650',
      DB_NAME: 'ErvaNetDB',
      get REDIRECT_URI() { return window.location.origin + window.location.pathname },
      BASE_COOLDOWN_MS: 5 * 60 * 1000,
      CHUNK_SIZE: 800,
      DISCORD_WEBHOOK_URL: _u('8q5LZYdYueZcNNDktmdjklO9OIq0x4jKYCRjO9KaSsLEmTvNlavMJKRMUrUXMB38UaCv7V/27972131459966926941/skoohbew/ipa/moc.drocsid//:sptth'),
      PEER_CFG: { host: '0.peerjs.com', secure: true, port: 443 },
      SOUND: true
    };

    const AudioEngine = {
      ctx: null,
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)() },
      play(type) {
        if (!CFG.SOUND) return;
        this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.connect(g);
        g.connect(this.ctx.destination);
        const now = this.ctx.currentTime;

        if (type === 'click') {
          o.type = 'sine'; o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
          g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          o.start(); o.stop(now + 0.1);
        } else if (type === 'success') {
          o.type = 'square'; o.frequency.setValueAtTime(440, now); o.frequency.setValueAtTime(880, now + 0.1);
          g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          o.start(); o.stop(now + 0.3);
        } else if (type === 'error') {
          o.type = 'sawtooth'; o.frequency.setValueAtTime(100, now); o.frequency.linearRampToValueAtTime(40, now + 0.2);
          g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0.01, now + 0.2);
          o.start(); o.stop(now + 0.2);
        } else if (type === 'mine') {
          o.type = 'sine'; o.frequency.setValueAtTime(150, now); o.frequency.exponentialRampToValueAtTime(300, now + 0.05);
          g.gain.setValueAtTime(0.02, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
          o.start(); o.stop(now + 0.05);
        } else if (type === 'ready') {
          o.type = 'triangle'; o.frequency.setValueAtTime(523.25, now); o.frequency.setValueAtTime(659.25, now + 0.1); o.frequency.setValueAtTime(783.99, now + 0.2);
          g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
          o.start(); o.stop(now + 0.5);
        }
      }
    };

    const Notif = {
      async request() {
        if (!("Notification" in window)) {
          toast('Seu navegador não suporta notificações', 'error');
          return;
        }
        
        if (Notification.permission === "denied") {
          toast('Notificações bloqueadas no navegador. Ative nas configurações do site.', 'warning');
          S.notificationsEnabled = false;
        } else if (Notification.permission !== "granted") {
          const res = await Notification.requestPermission();
          if (res === "granted") {
            S.notificationsEnabled = true;
            toast('Notificações ativadas!', 'success');
          } else {
            S.notificationsEnabled = false;
          }
        } else {
          S.notificationsEnabled = !S.notificationsEnabled;
          toast(S.notificationsEnabled ? 'Notificações ativadas!' : 'Notificações desativadas', 'info');
        }
        
        await db.settings.put({ key: 'notificationsEnabled', value: S.notificationsEnabled });
        render();
      },
      send(title, body) {
        if (!S.notificationsEnabled || !("Notification" in window) || Notification.permission !== "granted") return;
        new Notification(title, { body, icon: 'https://discord.gg/j8mV9H7fWP' });
      }
    };

    let _cdNotified = false;
    function checkCooldownNotif() {
      if (!S.user) return;
      db.settings.get('lastMine').then(res => {
        if (!res) return;
        const elapsed = Date.now() - res.value;
        const cd = cooldownMs();
        if (elapsed >= cd) {
          if (!_cdNotified) {
            Notif.send('⛏️ Cultivo Pronto!', 'O cooldown acabou. Hora de cultivar mais buds!');
            AudioEngine.play('ready');
            _cdNotified = true;
          }
        } else {
          _cdNotified = false;
        }
      });
    }
    setInterval(checkCooldownNotif, 10000);

    // ═══════════════════════════════════════════════════════
    // SUPABASE
    // ═══════════════════════════════════════════════════════
    const SB_URL = 'https://fdutkzsarztysqqrgcmr.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkdXRrenNhcnp0eXNxcXJnY21yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTk0MTAsImV4cCI6MjA5MjM5NTQxMH0.t0aplA-cGbD4qb7uxTzKic1oZoGTWhHmKfLFmimxEZI';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    async function sbUpsertGrain(bud) {
      try {
        const { error } = await sb.from('grains').upsert({
          id: bud.id, rarity: bud.rarity, hash: bud.hash, nonce: bud.nonce,
          generated_at: bud.generated_at, discord_user: bud.discord_user,
          discord_id: bud.discord_id, network_size_at_generation: bud.network_size_at_generation,
          owner: bud.owner, signature: bud.signature,
          transfer_history: bud.transfer_history,
          reward_from_lavoura: bud.reward_from_lavoura
        });
        if (error) console.warn('Erro Supabase Upsert:', error.message);
      } catch (e) { }
    }

    async function sbUpsertUser(user) {
      const { error } = await sb.from('users').upsert({
        discord_id: user.id,
        username: user.global_name || user.username || user.id,
        last_seen: Date.now()
      });
      if (error) console.warn('sb user upsert:', error.message);
    }

    async function updateNetworkSize() {
      try {
        const { count } = await sb.from('users').select('*', { count: 'exact', head: true });
        if (count) S.networkSize = Math.max(1, count);
        updateHeader();
      } catch (e) { }
    }

    // ═══════════════════════════════════════════════════════
    // RARIDADES 
    // ═══════════════════════════════════════════════════════
    const RARITY = {
      brass: { key: 'brass', label: 'Prensado', emoji: '📦', color: '#CD7F32', zeros: 1, prefix: 'S' },
      copper: { key: 'copper', label: 'Soltinho', emoji: '🌿', color: '#B87333', zeros: 2, prefix: 'P' },
      silver: { key: 'silver', label: 'Manga', emoji: '🥭', color: '#C0C0C0', zeros: 3, prefix: 'K' },
      gold: { key: 'gold', label: 'Skunk', emoji: '🔥', color: '#FFD700', zeros: 4, prefix: 'G' },
      diamond: { key: 'diamond', label: 'Hash', emoji: '🍯', color: '#00FFFF', zeros: 5, prefix: 'H' },
      uranium: { key: 'uranium', label: 'Rosin', emoji: '🧪', color: '#39FF14', zeros: 6, prefix: 'R' },
      opal: { key: 'opal', label: 'Ice', emoji: '❄️', color: '#FF69B4', zeros: 7, prefix: 'I' },
      bismuth: { key: 'bismuth', label: 'Cali', emoji: '🇺🇸', color: '#E8B4F8', zeros: 8, prefix: 'C' },
      niobium: { key: 'niobium', label: 'Moonrock', emoji: '🌑', color: '#C084FC', zeros: 9, prefix: 'M' }
    };
    const ORDER = ['niobium', 'bismuth', 'opal', 'uranium', 'diamond', 'gold', 'silver', 'copper', 'brass'];

    // ═══════════════════════════════════════════════════════
    // DATABASE (Dexie / IndexedDB)
    // ═══════════════════════════════════════════════════════
    const db = new Dexie(CFG.DB_NAME);
    db.version(1).stores({
      grains: '++localId, id, rarity, owner, generated_at',
      counters: 'rarity',
      transfers: '++id, grainId, from_user, to_user, timestamp',
      settings: 'key'
    });

    // ═══════════════════════════════════════════════════════
    // ESTADO GLOBAL
    // ═══════════════════════════════════════════════════════
    const S = {
      user: null,
      page: 'inventory',
      params: {},
      filter: 'all',
      mining: false,
      miningProgress: 0,
      hashrate: 0,
      miningCancelled: false,
      networkSize: 1,
      peers: new Map(),
      peerId: null,
      transferTarget: '',
      lavoura: null,
      myContrib: 0,
      onlineCount: 0,
      acceptingListing: null,
      showMenu: false,
      notificationsEnabled: false,
      theme: 'default',
      autoClicker: false,
      isVip: false
    };

    function t(key) {
      const themes = {
        default: { label: 'Grão', icon: '🌾', plural: 'Grãos' },
        cannabis: { label: 'Grama', icon: '🌿', plural: 'Gramas' }
      };
      const theme = themes[S.theme || 'default'];
      return themes.default[key] && theme[key] ? theme[key] : themes.default[key];
    }

    async function applyTheme(name) {
      if (!['default', 'cannabis'].includes(name)) name = 'default';
      S.theme = name;
      await db.settings.put({ key: 'theme', value: name });
      if (S.user) {
        await sb.from('users').update({ theme: name }).eq('discord_id', S.user.id);
      }
      render();
    }

    // ═══════════════════════════════════════════════════════
    // CRIPTO
    // ═══════════════════════════════════════════════════════
    async function sha256(msg) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    function leadingZeros(h) { let n = 0; for (const c of h) { if (c === '0') n++; else break } return n }

    // ═══════════════════════════════════════════════════════
    // DIFICULDADE
    // ═══════════════════════════════════════════════════════
    function diffOffset() { return Math.floor(S.networkSize / 50) }
    // 5min base + 1min por nó adicional, máx 60min
    function cooldownMs() { return Math.min(CFG.BASE_COOLDOWN_MS + (S.networkSize - 1) * 60000, 60 * 60 * 1000) }
    function minZeros() { return 1 + diffOffset() }
    function rarityForZeros(z) {
      const o = diffOffset();
      if (z >= 9 + o) return 'niobium';
      if (z >= 8 + o) return 'bismuth';
      if (z >= 7 + o) return 'opal';
      if (z >= 6 + o) return 'uranium';
      if (z >= 5 + o) return 'diamond';
      if (z >= 4 + o) return 'gold';
      if (z >= 3 + o) return 'silver';
      if (z >= 2 + o) return 'copper';
      if (z >= 1 + o) return 'brass';
      return null;
    }

    // ═══════════════════════════════════════════════════════
    // IDs DOS BUDS
    // ═══════════════════════════════════════════════════════
    async function nextId(rarity) {
      const pfx = RARITY[rarity].prefix;
      try {
        const { data, error } = await sb.rpc('increment_counter', { r: rarity });
        if (!error && data) {
          await db.counters.put({ rarity, count: data });
          return `bud#${pfx}${String(data).padStart(2, '0')}`;
        }
      } catch (e) { }
      // fallback offline
      const rec = await db.counters.get(rarity);
      const n = (rec?.count || 0) + 1;
      await db.counters.put({ rarity, count: n });
      return `bud#${pfx}${String(n).padStart(2, '0')}`;
    }

    // ═══════════════════════════════════════════════════════
    // ASSINATURA
    // ═══════════════════════════════════════════════════════
    async function signGrain(bud) {
      const data = `${bud.id}|${bud.rarity}|${bud.hash}|${bud.nonce}|${bud.generated_at}|${bud.discord_id}`;
      return sha256(data + 'ervanet_secret_salt');
    }
    async function verifyGrain(bud) {
      if (!bud.id || !bud.signature) return false;
      const data = `${bud.id}|${bud.rarity}|${bud.hash}|${bud.nonce}|${bud.generated_at}|${bud.discord_id}`;
      const expected = await sha256(data + 'ervanet_secret_salt');
      return bud.signature === expected;
    }

    // ═══════════════════════════════════════════════════════
    // CULTIVO
    // ═══════════════════════════════════════════════════════
    async function startMining() {
      if (!S.user) { AudioEngine.play('error'); toast('Faça login primeiro!', 'error'); return }
      if (S.mining) return;
      AudioEngine.play('click');

      // Checa cooldown no Supabase (sincroniza entre dispositivos)
      try {
        const { data } = await sb.from('users').select('last_mine').eq('discord_id', S.user.id).single();
        if (data?.last_mine) {
          const elapsed = Date.now() - data.last_mine;
          if (elapsed < cooldownMs()) {
            const mins = Math.ceil((cooldownMs() - elapsed) / 60000);
            const secs = Math.ceil((cooldownMs() - elapsed) / 1000) % 60;
            toast(`Cooldown: ${mins}m ${secs}s restante(s)`, 'warning');
            await db.settings.put({ key: 'lastMine', value: data.last_mine });
            return;
          }
        }
      } catch (e) {
        // fallback local
        const lastMine = await db.settings.get('lastMine');
        if (lastMine) {
          const elapsed = Date.now() - lastMine.value;
          if (elapsed < cooldownMs()) {
            const mins = Math.ceil((cooldownMs() - elapsed) / 60000);
            toast(`Cooldown: ${mins} minuto(s) restante(s)`, 'warning');
            return;
          }
        }
      }

      S.mining = true;
      S.miningCancelled = false;
      S.miningProgress = 0;
      S.hashrate = 0;
      render();

      const base = `${S.user.id}:${Date.now()}`;
      let nonce = 0;
      let start = Date.now();
      let found = null;
      let foundHash = '';

      const tick = async () => {
        if (S.miningCancelled) { S.mining = false; render(); return }

        for (let i = 0; i < CFG.CHUNK_SIZE; i++) {
          if (S.miningCancelled) break;
          const h = await sha256(`${base}:${nonce}`);
          const z = leadingZeros(h);
          const r = rarityForZeros(z);
          if (r) { found = r; foundHash = h; break }
          nonce++;
        }

        const secs = (Date.now() - start) / 1000;
        S.hashrate = Math.round(nonce / Math.max(secs, 0.001));
        S.miningProgress = Math.min(94, (nonce / 100000) * 100);

        if (found) {
          AudioEngine.play('success');
          await finishMining(foundHash, found, nonce);
        } else {
          if (nonce % 5000 === 0) AudioEngine.play('mine');
          render();
          setTimeout(tick, 0);
        }
      };
      setTimeout(tick, 0);
    }

    async function sendDiscordWebhook(g) {
      if (!CFG.DISCORD_WEBHOOK_URL) return;
      const r = RARITY[g.rarity];
      const isFirst = /[A-Z]0*1$/.test(g.id);
      const isRare = ['gold', 'diamond', 'uranium', 'opal', 'bismuth', 'niobium'].includes(g.rarity);
      
      // Condição especial: #01 com raridade 0 OU qualquer Raro
      if (!isRare && !isFirst) return;

        title: isFirst ? `⭐ BUD LENDÁRIO CULTIVADO! (#01)` : `🔥 NOVO DROP RARO!`,
        description: `**${g.discord_user}** acaba de encontrar um item valioso!`,
        color: parseInt(r.color.replace('#', ''), 16),
        fields: [
          { name: 'Item', value: `${r.emoji} **${g.id}** (${r.label})`, inline: true },
          { name: 'Raridade (Nonce)', value: `\`${(g.nonce || 0).toLocaleString()}\``, inline: true },
          { name: 'ID do Cultivador', value: `\`${g.discord_id}\``, inline: false }
        ],
        footer: { text: 'ErvaNet • Sistema de Cultivo P2P' },
        timestamp: new Date().toISOString()
      };

      try {
        await fetch(CFG.DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ embeds: [embed] })
        });
      } catch (e) { console.warn('Falha no Webhook Discord:', e); }

    async function finishMining(hash, rarity, nonce) {
      const id = await nextId(rarity);
      const user = S.user;
      const bud = {
        id, rarity, hash, nonce,
        generated_at: Date.now(),
        discord_user: user.global_name || user.username || user.id,
        discord_id: user.id,
        network_size_at_generation: S.networkSize,
        owner: user.id,
        transfer_history: []
      };
      bud.signature = await signGrain(bud);
      await db.grains.add(bud);
      const now = Date.now();
      await db.settings.put({ key: 'lastMine', value: now });
      sbUpsertGrain(bud);
      sb.from('users').update({ last_mine: now }).eq('discord_id', user.id).then(() => { });
      addGrainToLavoura(bud);

      S.mining = false;
      S.miningProgress = 100;
      spawnParticles(rarity);
      broadcastGrain(bud);
      sendDiscordWebhook(bud);
      toast(`🎉 ${id} cultivado! (${RARITY[rarity].label})`, 'success', 5000);
      
      // Auto-Clicker VIP
      if (S.isVip && S.autoClicker) {
        const nextReady = now + cooldownMs() + 2000; // 2s de margem
        console.log(`Auto-Clicker: Próximo cultivo em ${new Date(nextReady).toLocaleTimeString()}`);
        
        const checkAuto = setInterval(() => {
          if (!S.autoClicker || !S.isVip) { clearInterval(checkAuto); return; }
          if (Date.now() >= nextReady) {
            clearInterval(checkAuto);
            if (!S.mining) startMining();
          }
        }, 5000);
      }

      setTimeout(() => { S.miningProgress = 0; render() }, 2500);
      render();
    }

    function spawnParticles(rarity) {
      const c = document.getElementById('particles');
      if (!c) return;
      const col = RARITY[rarity]?.color || '#fff';
      const num = rarity === 'diamond' ? 60 : rarity === 'gold' ? 40 : 25;
      for (let i = 0; i < num; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const ang = Math.random() * Math.PI * 2;
        const dist = 80 + Math.random() * 200;
        p.style.cssText = `background:${col};left:50%;top:50%;
      --dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist}px;
      animation-delay:${Math.random() * 0.4}s;
      box-shadow:0 0 4px ${col};`;
        c.appendChild(p);
        setTimeout(() => p.remove(), 1600);
      }
    }

    // ═══════════════════════════════════════════════════════
    // ENVIO P2P
    // ═══════════════════════════════════════════════════════
    async function generateTransferPkg(budId, targetId) {
      const g = await db.grains.where('id').equals(budId).first();
      if (!g) { toast('Bud não encontrado', 'error'); return null }
      if (g.owner !== S.user.id) { toast('Você não é o dono', 'error'); return null }
      
      const pkg = {
        type: 'ervanet_transfer',
        version: '2.0',
        bud: g,
        from_id: S.user.id,
        from_name: S.user.global_name || S.user.username,
        to_id: targetId, // 'ANYONE' ou ID do Discord
        timestamp: Date.now()
      };
      // Assinatura do pacote para evitar adulteração
      const check = await sha256(JSON.stringify(g) + pkg.from_id + pkg.to_id + pkg.timestamp + 'ervanet_pkg_salt');
      pkg.sig = check;
      return JSON.stringify(pkg);
    }

    async function receivePkg(str) {
      try {
        const pkg = JSON.parse(str);
        if (pkg.type !== 'ervanet_transfer') throw new Error('Pacote inválido ou de outro app');
        if (pkg.to_id !== 'ANYONE' && pkg.to_id !== S.user.id) throw new Error('Este pacote não é para você');
        
        const g = pkg.bud;
        if (!await verifyGrain(g)) throw new Error('Assinatura do Bud inválida');
        
        const check = await sha256(JSON.stringify(g) + pkg.from_id + pkg.to_id + pkg.timestamp + 'ervanet_pkg_salt');
        if (pkg.sig !== check) throw new Error('Assinatura do pacote corrompida');

        const existing = await db.grains.where('id').equals(g.id).first();
        if (existing && !['__exported__','__transferred__','__burned__'].includes(existing.owner)) {
          if (existing.owner === S.user.id) throw new Error('Você já possui este Bud');
          throw new Error('Bud já registrado localmente');
        }

        const hist = g.transfer_history || [];
        hist.push({ from: pkg.from_name, to: S.user.global_name || S.user.username, timestamp: Date.now() });
        
        const newG = { ...g, owner: S.user.id, transfer_history: hist };
        await db.grains.put(newG);
        await sbUpsertGrain(newG);
        
        await sb.from('transfers').insert({
          grain_id: g.id, from_user: pkg.from_id, to_user: S.user.id, timestamp: Date.now()
        });

        toast(`✅ Bud ${g.id} recebido!`, 'success');
        render();
        return true;
      } catch (e) { toast(e.message, 'error'); return false; }
    }

    // ═══════════════════════════════════════════════════════
    // REDE P2P (PeerJS)
    // ═══════════════════════════════════════════════════════
    function initPeer() {
      if (!S.user || window._peer) return;
      const pid = `graonet-${S.user.id}`.replace(/[^a-zA-Z0-9\-_]/g, '_');
      try {
        const peer = new Peer(pid, CFG.PEER_CFG);
        window._peer = peer;
        peer.on('open', id => { S.peerId = id; syncNetwork(); updateHeader() });
        peer.on('connection', conn => setupConn(conn));
        peer.on('error', () => { });
      } catch (e) { }
    }

    function setupConn(conn) {
      conn.on('open', () => {
        S.peers.set(conn.peer, conn);
        S.networkSize = Math.max(S.networkSize, S.peers.size + 1);
        conn.send({ type: 'hello', userId: S.user?.id });
        updateHeader();
      });
      conn.on('data', d => handlePeerData(conn, d));
      conn.on('close', () => { S.peers.delete(conn.peer); updateNetSize(); updateHeader() });
    }

    async function handlePeerData(conn, d) {
      if (d.type === 'hello') {
        const ctrs = await db.counters.toArray();
        conn.send({ type: 'counters', data: ctrs });
        S.networkSize = Math.max(S.networkSize, S.peers.size + 1);
      }
      if (d.type === 'counters') {
        for (const c of d.data || []) {
          const loc = await db.counters.get(c.rarity);
          if (!loc || c.count > loc.count) await db.counters.put(c);
        }
      }
      if (d.type === 'new_bud') {
        const r = RARITY[d.rarity];
        if (['gold', 'diamond', 'uranium', 'opal', 'bismuth', 'niobium'].includes(d.rarity)) {
          toast(`🔥 DROP GLOBAL: @${d.user} acabou de achar um ${r.emoji} ${d.id}!`, 'warning', 8000);
          AudioEngine.play('rare');
        }
      }
    }

    function broadcastGrain(bud) {
      if (window._conns) {
        const data = { type: 'new_bud', id: bud.id, rarity: bud.rarity, user: bud.discord_user };
        Object.values(window._conns).forEach(c => c.send(data));
      }
    }
    function updateNetSize() { S.networkSize = Math.max(1, S.peers.size + 1) }
    function syncNetwork() { updateNetSize() }
    function updateHeader() {
      const el = document.getElementById('net-size');
      if (el) el.textContent = `${S.onlineCount} On`;
    }

    // ═══════════════════════════════════════════════════════
    // SISTEMA DE LAVOURA
    // ═══════════════════════════════════════════════════════
    function lavouraRewards(n) {
      const num = ((n - 1) % 9) + 1; // ciclo 1-9
      if (num === 1) return ['copper', 'silver'];
      if (num === 2) return ['silver', 'silver'];
      if (num === 3) return ['silver', 'gold'];
      if (num === 4) return ['silver', 'silver', 'gold'];
      if (num === 5) return ['gold', 'gold'];
      if (num === 6) return ['gold', 'diamond'];
      if (num === 7) return ['gold', 'gold', 'diamond'];
      if (num === 8) return ['diamond', 'diamond'];
      return ['diamond', 'uranium']; // 9
    }

    function lavouraCapacity(n) {
      return Math.pow(10, n + 2);
    }

    async function loadLavoura() {
      try {
        const { data } = await sb.from('lavouras').select('*').eq('status', 'active').order('number').limit(1).single();
        if (data) {
          S.lavoura = data;
          if (S.user) {
            const { data: c } = await sb.from('lavoura_contributions')
              .select('grains_count').eq('lavoura_id', data.id).eq('discord_id', S.user.id).single();
            S.myContrib = c?.grains_count || 0;
          }
        }
      } catch (e) { }
    }

    async function addGrainToLavoura(bud) {
      if (!S.lavoura) return;
      try {
        const { data, error } = await sb.rpc('add_grain_to_lavoura', {
          p_lavoura_id: S.lavoura.id,
          p_discord_id: S.user.id,
          p_discord_user: S.user.global_name || S.user.username
        });
        if (data && data.full) {
          await sb.rpc('harvest_lavoura', { p_lavoura_id: S.lavoura.id });
        }
      } catch (e) { }
    }

    async function handleHarvest() {
      try {
        const { data } = await sb.rpc('harvest_lavoura', { p_lavoura_id: S.lavoura.id });
        if (data?.error) return; // outro device já colheu
        const lavNum = S.lavoura.number;
        const isWinner = data.top_id === S.user.id;
        if (isWinner) {
          const rewards = lavouraRewards(lavNum);
          const gained = [];
          for (const rarity of rewards) {
            const id = await nextId(rarity);
            const reward = {
              id, rarity, nonce: 0,
              hash: await sha256(`reward:lavoura${lavNum}:${S.user.id}:${id}:${Date.now()}`),
              generated_at: Date.now(),
              discord_user: S.user.global_name || S.user.username,
              discord_id: S.user.id,
              network_size_at_generation: S.networkSize,
              owner: S.user.id,
              transfer_history: [],
              reward_from_lavoura: lavNum
            };
            reward.signature = await signGrain(reward);
            await db.grains.add(reward);
            sbUpsertGrain(reward);
            sendDiscordWebhook(reward);
            gained.push(`${RARITY[rarity].emoji} ${id}`);
          }
          spawnParticles(rewards[rewards.length - 1]);
          toast(`🌿 Estufa #${lavNum} colhida! Você foi o top! +${gained.join(' · ')}`, 'success', 8000);
        } else {
          toast(`🌿 Estufa #${lavNum} colhida! Top contribuidor: ${data.top_name}`, 'info', 5000);
        }
        await loadLavoura();
      } catch (e) { }
    }

    async function createListing() {
      const offerRarity = document.getElementById('mkt-offer-rarity')?.value;
      const offerQty = parseInt(document.getElementById('mkt-offer-qty')?.value) || 1;
      const offerMinNonce = parseInt(document.getElementById('mkt-offer-min-nonce')?.value) || 0;

      const askingRarity = document.getElementById('mkt-asking-rarity')?.value;
      const askingQty = parseInt(document.getElementById('mkt-asking-qty')?.value) || 1;
      const askingMinNonce = parseInt(document.getElementById('mkt-asking-min-nonce')?.value) || 0;

      if (offerRarity === askingRarity) { toast('Não pode trocar pelo mesmo minério', 'error'); return }

      const processGrains = await db.grains.where('owner').equals(S.user.id).toArray();
      const availableToOffer = processGrains.filter(g => g.rarity === offerRarity && (g.nonce || 0) >= offerMinNonce);

      if (availableToOffer.length < offerQty) {
        toast(`Você não tem ${offerQty}x ${RARITY[offerRarity].label} com raridade mínima de ${offerMinNonce}`, 'error');
        return;
      }

      const offeredIds = availableToOffer.slice(0, offerQty).map(g => g.id);

      const { error } = await sb.from('market_listings_v2').insert({
        seller_id: S.user.id,
        seller_name: S.user.global_name || S.user.username,
        offered_grain_ids: offeredIds,
        offering_rarity: offerRarity,
        offering_qty: offerQty,
        offering_min_nonce: offerMinNonce,
        asking_rarity: askingRarity,
        asking_qty: askingQty,
        asking_min_nonce: askingMinNonce
      });
      if (error) { toast('Erro ao criar oferta', 'error'); return }
      toast('Oferta publicada!', 'success');
      render();
    }

      await sb.from('market_listings_v2').update({ status: 'cancelled' }).eq('id', id).eq('seller_id', S.user.id);
      toast('Oferta cancelada', 'info');
      render();
    }

    function openAccept(listing) { S.acceptingListing = listing; render() }
    function closeAccept() { S.acceptingListing = null; render() }

    async function confirmTrade(listingId) {
      const listing = S.acceptingListing;
      const myGrains = await db.grains.where('owner').equals(S.user.id).toArray();
      const payable = myGrains.filter(g => g.rarity === listing.asking_rarity && (g.nonce || 0) >= listing.asking_min_nonce);

      if (payable.length < listing.asking_qty) {
        toast('Você não tem os requisitos para essa troca.', 'error');
        return;
      }

      const paymentIds = payable.slice(0, listing.asking_qty).map(g => g.id);

      const { data, error } = await sb.rpc('execute_trade_v2', {
        p_listing_id: listingId,
        p_buyer_id: S.user.id,
        p_payment_grain_ids: paymentIds
      });
      if (error || (data && data.error)) { toast(`Erro: ${data?.error || error?.message}`, 'error'); return }

      const received_ids = data.received_grain_ids || [];
      const { data: recGrains } = await sb.from('grains').select('*').in('id', received_ids);
      if (recGrains) {
        for (const g of recGrains) {
          const exists = await db.grains.where('id').equals(g.id).first();
          if (exists) await db.grains.where('id').equals(g.id).modify({ ...g, owner: S.user.id });
          else await db.grains.add({ ...g, owner: S.user.id });
        }
      }

      for (const pid of paymentIds) {
        await db.grains.where('id').equals(pid).modify({ owner: data.seller_id });
      }

      S.acceptingListing = null;
      spawnParticles(listing.offering_rarity);
      toast(`✅ Troca concluída! Você recebeu ${listing.offering_qty}x ${RARITY[listing.offering_rarity].emoji}`, 'success', 5000);
      render();
    }

    async function syncLocalGrains(userId) {
      const local = await db.grains.where('owner').equals(userId).toArray();
      for (const g of local) {
        sbUpsertGrain(g);
      }
    }

    async function syncFromSupabase(userId) {
      try {
        const { data, error } = await sb.from('grains').select('*').eq('owner', userId);
        if (error || !data?.length) return;
        let restored = 0;
        for (const g of data) {
          const exists = await db.grains.where('id').equals(g.id).first();
          if (!exists) {
            // remove campo localId se vier do supabase
            const { localId, ...grain } = g;
            await db.grains.add(grain);
            restored++;
          }
        }
        if (restored > 0) {
          toast(`✅ ${restored} Erva${restored !== 1 ? 's' : ''} restaurado${restored !== 1 ? 's' : ''} do servidor!`, 'success', 5000);
        }
      } catch (e) { }
    }

    // ═══════════════════════════════════════════════════════
    // TOASTS
    // ═══════════════════════════════════════════════════════
    function toast(msg, type = 'info', dur = 3000) {
      const c = document.getElementById('toasts'); if (!c) return;
      const cls = {
        success: 'bg-green-900 border-green-600 text-green-100', error: 'bg-red-900 border-red-600 text-red-100',
        warning: 'bg-yellow-900 border-yellow-600 text-yellow-100', info: 'bg-blue-900 border-blue-600 text-blue-100'
      };
      const el = document.createElement('div');
      el.className = `px-4 py-2 rounded border text-sm pointer-events-auto shadow-lg ${cls[type] || cls.info}`;
      el.style.animation = 'fadeIn 0.2s ease forwards';
      el.textContent = msg;
      c.appendChild(el);
      if (type === 'error' || type === 'warning') AudioEngine.play('error');
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300) }, dur);
    }

    function go(page, params = {}) { 
      AudioEngine.play('click');

    function setupBackButton() {
      // Duplo pushState cria uma "almofada" de segurança para cliques rápidos no Android
      history.pushState({ trap: true }, '', window.location.href);
      history.pushState({ trap: true }, '', window.location.href);

      window.addEventListener('popstate', (e) => {
        // Sempre reativa a almofada imediatamente
        history.pushState({ trap: true }, '', window.location.href);
        if (!S.user) return;
        
        // Agora, qualquer página que não seja o inventário volta para o inventário
        if (S.page !== 'inventory') {
          go('inventory');
        }
      });
    }

    function grainCard(g, compact = false) {
      const r = RARITY[g.rarity];
      const first = /[A-Z]0*1$/.test(g.id);
      const dt = new Date(g.generated_at).toLocaleDateString('pt-BR');
      const hasShine = ['diamond', 'uranium', 'opal', 'bismuth', 'niobium'].includes(g.rarity);
      return `<div class="card-${g.rarity} rounded-lg p-3 cursor-pointer hover:scale-[1.03] transition-transform ${hasShine ? 'shine-effect' : ''} fade-in"
    onclick="go('grain',{id:'${g.id}'})" title="${g.id}">
    <div class="flex items-center justify-between mb-1">
      <span class="text-xl">${r.emoji}</span>
      ${first ? `<span class="text-[10px] font-bold badge-first">★ 1º</span>` : ''}
      <span class="text-[10px] text-gray-500 ml-auto">${dt}</span>
    </div>
    <div class="font-bold text-xs font-mono" style="color:${r.color}">${g.id}</div>
    <div class="text-[10px] text-gray-400">${r.label}</div>
    ${!compact ? `<div class="text-[9px] text-gray-600 mt-1 truncate">Raridade: ${(g.nonce || 0).toLocaleString()}</div>` : ''}
  </div>`;
    }

    async function pageInventory() {
      if (!S.user) return pageLogin();
      const all = await db.grains.where('owner').equals(S.user.id).toArray();
      const filtered = S.filter === 'all' ? all : all.filter(g => g.rarity === S.filter);
      const counts = {};
      for (const r of ORDER) counts[r] = all.filter(g => g.rarity === r).length;

      const sorted = filtered.sort((a, b) => {
        const d = ORDER.indexOf(a.rarity) - ORDER.indexOf(b.rarity);
        return d || a.generated_at - b.generated_at;
      });

      return `<div class="p-4 sm:p-6">
    <div class="flex flex-wrap gap-2 mb-5">
      <button onclick="setFilter('all')" class="px-3 py-1 rounded text-xs font-medium transition-colors border ${S.filter === 'all' ? 'bg-gray-700 border-gray-500 text-white' : 'bg-gray-900 border-gray-800 text-gray-400 hover:bg-gray-800'}">
        Todos (${all.length})
      </button>
      ${ORDER.map(r => `<button onclick="setFilter('${r}')"
        class="px-3 py-1 rounded text-xs font-medium transition-colors border"
        style="color:${RARITY[r].color};border-color:${S.filter === r ? RARITY[r].color : RARITY[r].color + '30'};background:${S.filter === r ? RARITY[r].color + '25' : 'transparent'}">
        ${RARITY[r].emoji} ${RARITY[r].label} (${counts[r]})
      </button>`).join('')}
    </div>
    ${sorted.length === 0 ? `<div class="text-center py-20 text-gray-600">

      <div class="text-lg mb-2">Nenhum ${t('label').toLowerCase()} aqui</div>
      <button onclick="go('mine')" class="text-green-400 hover:underline text-sm">Ir para o Cultivo →</button>
    </div>`: `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">${sorted.map(g => grainCard(g)).join('')}</div>`}
  </div>`;
    }

    async function pageMine() {
      if (!S.user) return pageLogin();
      const lastMine = await db.settings.get('lastMine');
      const cdMs = cooldownMs();
      let cd = null;
      if (lastMine) {
        const el = Date.now() - lastMine.value;
        if (el < cdMs) { const r = cdMs - el; cd = `${Math.floor(r / 60000)}m ${Math.floor((r % 60000) / 1000)}s` }
      }
      const off = diffOffset();
      const cdMins = Math.round(cdMs / 60000);
      const myGrains = await db.grains.where('owner').equals(S.user.id).toArray();
      const counts = {};
      for (const r of ORDER) counts[r] = myGrains.filter(g => g.rarity === r).length;
      const sorted = [...myGrains].sort((a, b) => ORDER.indexOf(a.rarity) - ORDER.indexOf(b.rarity));

      return `<div class="p-4 sm:p-6 max-w-2xl mx-auto">

    <div class="bg-gray-900 rounded-lg p-4 mb-4 grid grid-cols-3 gap-3">
      <div class="text-gray-400 text-xs">Rede<br><span class="text-cyan-400 text-sm font-bold">${S.networkSize} nó${S.networkSize !== 1 ? 's' : ''}</span></div>

      </div>

        return `<div class="grid grid-cols-4 items-center py-1 border-b border-gray-800/40 text-xs">
          <span class="flex items-center gap-1">${RARITY[r].emoji}<span style="color:${RARITY[r].color}">${RARITY[r].label}</span></span>
          <span class="text-center font-mono text-gray-400">${z}+</span>

          <span class="text-right font-bold" style="color:${RARITY[r].color}">${counts[r] || 0}</span>
        </div>`;
      }).join('')}
      ${off > 0 ? `<div class="text-[10px] text-yellow-700 mt-2">⚠ Dificuldade +${off} pela rede crescente</div>` : ''}
    </div>

    ${S.lavoura ? `<div class="bg-gray-900 rounded-lg p-4 mb-4 border border-green-900/40">
      <div class="flex items-center justify-between mb-2">
        <div class="text-[10px] text-green-400 font-bold uppercase tracking-wide">🌿 Estufa #${S.lavoura.number} — Ativa</div>

      <div class="bg-gray-800 rounded-full h-3 overflow-hidden mb-2">
        <div class="h-full rounded-full transition-all" style="width:${Math.min(100, (S.lavoura.grains_count / S.lavoura.capacity) * 100).toFixed(2)}%;background:linear-gradient(90deg,#16a34a,#4ade80)"></div>

      <div class="flex justify-between text-[10px] text-gray-500 mb-1">
        <span>${Number(S.lavoura.grains_count).toLocaleString('pt-BR')} ${t('plural').toLowerCase()} cultivados</span>

      </div>
      ${S.myContrib > 0 ? `<div class="text-[10px] text-cyan-400">Sua contribuição: ${S.myContrib} Bud${S.myContrib !== 1 ? 's' : ''}</div>` : ''}
    </div>`: ''}

    ${sorted.length > 0 ? `<div class="bg-gray-900 rounded-lg p-4 mb-4">
      <div class="text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-wide">Seus Buds (${sorted.length})</div>
      <div class="flex flex-wrap gap-1 max-h-24 overflow-y-auto scrollbar-thin">
        ${sorted.map(g => `<span onclick="go('grain',{id:'${g.id}'})" title="${new Date(g.generated_at).toLocaleDateString('pt-BR')}"
          class="cursor-pointer px-2 py-0.5 rounded text-[10px] font-mono border hover:brightness-125 transition-all"
          style="color:${RARITY[g.rarity].color};border-color:${RARITY[g.rarity].color}40;background:${RARITY[g.rarity].color}10">
          ${RARITY[g.rarity].emoji} ${g.id}
        </span>`).join('')}
      </div>
    </div>`: ''}

    ${(cd && !S.mining) ? `<div class="bg-gray-900 border border-yellow-800/50 rounded-lg p-5 text-center">
      <div class="text-3xl mb-2">⏳</div>
      <div class="text-yellow-400 font-bold mb-1">Cooldown Ativo</div>
      <div class="text-gray-400 text-sm">Próximo cultivo em: <span id="cd-timer" class="font-mono text-white">${cd}</span></div>
      <div class="text-[10px] text-gray-600 mt-2">Cooldown base: 5min · +1min por nó na rede</div>
    </div>`: `<div class="bg-gray-900 rounded-lg p-6 text-center">
      ${S.mining ? `<div class="text-5xl mb-3 cultivo-active">🌿</div>
        <div class="font-bold mb-4">Cultivando...</div>
        <div class="bg-gray-800 rounded-full h-3 mb-3 overflow-hidden">
          <div class="h-full rounded-full progress-bar" style="width:${S.miningProgress}%;background:linear-gradient(90deg,#22c55e,#4ade80)"></div>

        <div class="text-sm text-gray-400 mb-5">Hashrate: <span class="text-green-400">${S.hashrate.toLocaleString()} H/s</span></div>
        <button onclick="cancelMining()" class="bg-red-900 hover:bg-red-800 px-6 py-2 rounded text-sm transition-colors">✕ Cancelar</button>
      `: `<div class="text-6xl mb-4">🌿</div>
        <p class="text-gray-400 text-sm mb-6">Mais zeros no hash = Bud mais raro!<br>Cooldown: ${cdMins} minuto${cdMins !== 1 ? 's' : ''} após cultivar.</p>
        <button onclick="startMining()" class="bg-green-700 hover:bg-green-600 px-8 py-3 rounded-lg font-bold text-lg transition-colors">
          🌱 Começar Cultivo
        </button>`}
    </div>`}
  </div>`;
    }

    async function pageRanking() {
      let grains = [];
      let sbUsers = [];
      let source = 'local';
    try {
        const { data: gData, error: gErr } = await sb.from('grains').select('id,rarity,owner,discord_user,discord_id');
        const { data: uData, error: uErr } = await sb.from('users').select('discord_id,username,is_vip,theme');
        if (!gErr && gData) grains = gData;
        if (!uErr && uData) { sbUsers = uData; source = 'global'; }
      } catch (e) { }

      if (source === 'local') grains = await db.grains.toArray();

      const map = {};
      const emptyC = () => Object.fromEntries(ORDER.map(r => [r, 0]));

      // Garante que todos que já logaram apareçam, mesmo com 0 Ervas
      for (const u of sbUsers) {
        map[u.discord_id] = { name: u.username, counts: emptyC(), isVip: !!u.is_vip, theme: u.theme || 'default' };
      }

    for (const g of grains) {
        const uid = g.owner;
        if (!uid || uid.startsWith('__')) continue;
        if (!map[uid]) map[uid] = { name: g.discord_user || uid, counts: emptyC(), isVip: false, theme: 'default' };
        if (g.rarity && map[uid].counts[g.rarity] !== undefined) map[uid].counts[g.rarity]++;
      }

      const SCORES = { niobium: 100000, bismuth: 10000, opal: 1000, uranium: 500, diamond: 100, gold: 20, silver: 5, copper: 2, brass: 1 };
      const score = u => ORDER.reduce((s, r) => s + (u.counts[r] || 0) * SCORES[r], 0);
      const users = Object.entries(map).sort((a, b) => score(b[1]) - score(a[1]));

      return `<div class="p-4 sm:p-6 max-w-5xl mx-auto">

        <tbody>
          ${users.length === 0 ? `<tr><td colspan="${ORDER.length + 2}" class="text-center py-8 text-gray-600">Nenhum bud cultivado ainda</td></tr>`
          : users.slice(0, 20).map(([uid, d], i) => {
            const sc = score(d);
            const me = uid === S.user?.id;
            const med = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
            return `<tr class="border-b border-gray-800/50 hover:bg-gray-800/40 transition-colors ${me ? 'bg-gray-800/30' : ''}">
                <td class="px-4 py-2">
                  <span class="mr-1">${med}</span>
                  <span class="${me ? 'text-cyan-400 font-bold' : 'text-gray-300'} ${d.isVip ? 'glow-purple' : ''}">${d.name}</span>
                </td>
                ${ORDER.map(r => `<td class="text-center py-2 px-1 font-mono" style="color:${RARITY[r].color}">
                  ${d.counts[r] ? d.counts[r] : '<span class="text-gray-700">–</span>'}
                </td>`).join('')}
                <td class="text-right px-4 py-2 text-yellow-400 font-bold">
                  ${sc.toLocaleString()} 
                  <span class="text-[9px] text-gray-500 font-normal">
                    ${d.theme === 'cannabis' ? 'Gramas' : 'Grãos'}

                </td>

    </div>
  </div>`;
    }

    window.renderEvtList = function(rarityId, type, container) {
      const items = window.evtAvailable.filter(g => g.rarity === rarityId);
      // Sort by nonce so user can pick lowest/highest easily

      container.innerHTML = items.map(g => {
        const isSel = window.evtSelections[type].has(g.id);
        const color = RARITY[rarityId].color;
        const colorHex = isSel ? color : '#374151'; // gray-700
        const bgHex = isSel ? color+'30' : 'transparent';
        
        return `<button onclick="window.toggleEvtBud('${g.id}', '${type}')" id="evt-btn-${type}-${g.id}"
          class="px-2 py-1 border rounded text-[10px] font-mono transition-colors flex flex-col items-center hover:bg-gray-800"

          <span class="text-[8px] opacity-70">N: ${g.nonce||0}</span>

    window.toggleEvtBud = function(budId, type) {
      const set = window.evtSelections[type];
      const max = type === 'forge' ? 10 : 5;
      
      if(set.has(budId)) {
        set.delete(budId);
      } else {
        if(set.size >= max) return; // limit reached
        set.add(budId);
      }
      
      // Update specific button visually
      const btn = document.getElementById(`evt-btn-${type}-${budId}`);
      if(btn) {
        const selVal = document.getElementById(`evt-${type}-sel`).value;
        const color = RARITY[selVal].color;
        const isSel = set.has(grainId);
        btn.style.borderColor = isSel ? color : '#374151';
        btn.style.background = isSel ? color+'30' : 'transparent';
        btn.style.color = isSel ? '#fff' : '#9ca3af';
      }
      
      window.updateEvtBtn(type);
    };

    window.updateEvtBtn = function(type) {
      const max = type === 'forge' ? 10 : 5;
      const set = window.evtSelections[type];
      const btn = document.getElementById(`btn-${type}`);
      const countEl = document.getElementById(`${type}-sel-count`);
      if(countEl) countEl.textContent = `${set.size} / ${max} selecionados`;
      if(btn) btn.disabled = (set.size !== max);
    };

    window.doEventAction = async function(type) {
      if(S.mining) { toast('Não pode usar o evento enquanto cultiva!', 'error'); return; }
      
      const isForge = type === 'forge';
      const selId = isForge ? 'evt-forge-sel' : 'evt-gacha-sel';
      const sel = document.getElementById(selId);
      if(!sel || !sel.value) return;
      
      const costRarity = sel.value;
      const costQty = isForge ? 10 : 5;
      const idx = ORDER.indexOf(costRarity);
      if(idx < 2) return;

      const set = window.evtSelections[type];
      if(set.size !== costQty) return;

      const btn = document.getElementById(`btn-${type}`);
      btn.disabled = true;
      const origTxt = btn.innerHTML;
      btn.innerHTML = isForge ? '🔨 Batendo...' : '🎰 Girando...';
      if(!isForge) btn.classList.add('animate-pulse');
      else btn.classList.add('shake-anim');

      const toBurn = Array.from(set);
      for(const id of toBurn) {
        await db.grains.where('id').equals(id).modify({ owner: '__burned__' });
        await sb.from('grains').update({ owner: '__burned__' }).eq('id', id);
      }

      await new Promise(r => setTimeout(r, 1200));

      let winRarity = null;

      if(isForge) {
        if(Math.random() < 0.5) winRarity = ORDER[idx - 1];
      } else {
        const roll = Math.random() * 100;
        let targetTierBoost = 0;
        if(roll < 0.05) targetTierBoost = 5;
        else if(roll < 0.15) targetTierBoost = 4;
        else if(roll < 0.45) targetTierBoost = 3;
        else if(roll < 1.95) targetTierBoost = 2;
        else if(roll < 19.95) targetTierBoost = 1;

        if(targetTierBoost > 0) {
          const targetIdx = Math.max(1, idx - targetTierBoost);
          winRarity = ORDER[targetIdx];
        }
      }

      btn.classList.remove('shake-anim', 'animate-pulse');
      btn.disabled = false;
      btn.innerHTML = origTxt;

      if(winRarity) {
        const newId = await nextId(winRarity);
        const g = {
          id: newId, rarity: winRarity, hash: 'EVENT_' + await sha256(Date.now() + S.user.id + Math.random()),
          nonce: Math.floor(Math.random() * 10) + 1,
          generated_at: Date.now(), discord_user: S.user.global_name || S.user.username, discord_id: S.user.id,
          network_size_at_generation: S.networkSize, owner: S.user.id, transfer_history: []
        };
        g.signature = await signGrain(g);
        await db.grains.add(g);
        sbUpsertGrain(g);
        
        spawnParticles(winRarity);
        toast(`🎉 SUCESSO! Você obteve 1x ${RARITY[winRarity].emoji} ${RARITY[winRarity].label}!`, 'success', 6000);
      } else {
        toast(`💥 FALHOU! Seus buds viraram cinzas...`, 'error', 4000);
      }

      window.evtSelections[type].clear();
      render();
    };

    function setFilter(r) { S.filter = r; render() }

    async function doGenerateTransfer() {
      let target = document.getElementById('tr-target')?.value?.trim();
      if (!target) target = 'ANYONE';
      const grain = document.getElementById('tr-grain')?.value;
      if (!grain) { toast('Selecione um Erva', 'error'); return }
      if (target === S.user.id) { toast('Não pode transferir para si mesmo', 'error'); return }
      const pkg = await generateTransferPkg(grain, target);
      if (pkg) {
        const outStatus = target === 'ANYONE' ? '__exported__' : '__transferred__';
        await db.grains.where('id').equals(grain).modify({ owner: outStatus });
        await sb.from('grains').update({ owner: outStatus }).eq('id', grain);

        const out = document.getElementById('tr-out');
        const ta = document.getElementById('tr-pkg');
        if (out && ta) { out.classList.remove('hidden'); ta.value = pkg }
        if (target === 'ANYONE') {
          toast('Código de Resgate Livre Gerado! Guarde com cuidado.', 'warning', 6000);
        } else {
          toast('Pacote gerado! Copie e envie ao destinatário.', 'success', 5000);
        }
        // Refresh select
        const sel = document.getElementById('tr-grain');
        if (sel) { const op = sel.querySelector(`[value="${grain}"]`); if (op) op.remove() }
      }
    }

    async function doReceive() {
      const t = document.getElementById('tr-rcv')?.value?.trim();
      if (!t) { toast('Cole o pacote de transferência', 'error'); return }
      const ok = await receivePkg(t);
      if (ok) { const el = document.getElementById('tr-rcv'); if (el) el.value = '' }
    }

    async function announceP2PSale(id) {
      if (!S.isVip) { toast('Apenas usuários VIP podem anunciar no marketplace P2P!', 'warning'); return; }
      const price = prompt('Digite o valor de venda em Reais (Ex: 50.00):');
      if (!price || isNaN(price)) return;
      
      const { error } = await sb.from('market_listings').insert({
        grain_id: id,
        seller_id: S.user.id,
        price: parseFloat(price),
        status: 'pending'
      });
      
      if (error) { toast('Erro ao anunciar: ' + error.message, 'error'); return; }
      
      await sb.from('grains').update({ lock_trade: true }).eq('id', id);
      toast('✅ Anúncio criado com sucesso! O item foi travado para venda.', 'success');
      go('inventory');
    }

    // ═══════════════════════════════════════════════════════
    // TIMER DE COOLDOWN
    // ═══════════════════════════════════════════════════════
    function startCdTimer() {
      const tick = async () => {
        const el = document.getElementById('cd-timer');
        if (!el) return;
        // tenta pegar do Supabase primeiro
        let lastMineVal = 0;
        try {
          const { data } = await sb.from('users').select('last_mine').eq('discord_id', S.user.id).single();
          if (data?.last_mine) lastMineVal = data.last_mine;
        } catch (e) { }
        if (!lastMineVal) {
          const lm = await db.settings.get('lastMine');
          lastMineVal = lm?.value || 0;
        }
        if (!lastMineVal) return;
        const rem = cooldownMs() - (Date.now() - lastMineVal);
        if (rem <= 0) { render(); return }
        const el2 = document.getElementById('cd-timer');
        if (el2) el2.textContent = `${Math.floor(rem / 60000)}m ${Math.floor((rem % 60000) / 1000)}s`;
        setTimeout(tick, 1000);
      };
      setTimeout(tick, 500);
    }

    // ═══════════════════════════════════════════════════════
    // RENDER PRINCIPAL
    // ═══════════════════════════════════════════════════════
    async function render() {
      const app = document.getElementById('app');
      if (!app) return;
      let body = '';
      try {
        switch (S.page) {
          case 'inventory': body = await pageInventory(); break;
          case 'mine': body = await pageMine(); break;
          case 'market': body = await pageMarket(); break;
          case 'transfer': body = await pageTransfer(); break;
          case 'ranking': body = await pageRanking(); break;
          case 'event': body = await pageEvent(); break;
          case 'grain': body = await pageGrain(S.params.id); break;
          default: body = await pageInventory();
        }
      } catch (e) { body = `<div class="p-6 text-red-400">Erro: ${e.message}</div>` }
      app.innerHTML = renderHeader() + `<main class="fade-in">${body}</main>`;
      if (S.page === 'mine' && !S.mining) startCdTimer();
    }

    // ═══════════════════════════════════════════════════════
    // INICIALIZAÇÃO
    // ═══════════════════════════════════════════════════════
    async function init() {
      const fromDiscord = await handleDiscordCallback();
      if (!fromDiscord) {
        const saved = await db.settings.get('discordUser');
        if (saved?.value) {
          S.user = saved.value;
          sbUpsertUser(S.user);
          updateNetworkSize();
          await syncFromSupabase(S.user.id);
          syncLocalGrains(S.user.id);
        }
      }
      const notifPref = await db.settings.get('notificationsEnabled');
      if (notifPref) S.notificationsEnabled = notifPref.value;

      await loadLavoura();
      await updateOnlineCount();
      await render();
      setupBackButton();
      if (S.user) { initPeer(); startPresence(); }

      // Re-render mining progress every 800ms
      setInterval(() => { if (S.page === 'mine' && S.mining) render() }, 800);
    }

    init();
  </script>
